<!DOCTYPE HTML>

<html>
	<head>
		<title>4ydam (Assets)</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="icon" type="image/png" href="../images/logo-WhiteOnBlack.png" />
		<link rel="stylesheet" href="css/main.css" />
		<noscript><link rel="stylesheet" href="css/noscript.css" /></noscript>
	</head>
	<body class="is-preload assets-page">
		<!-- Wrapper -->
			<div id="wrapper">
				<div data-include="partials/header.html"></div>

				<!-- Main -->
					<div id="main">
						<div class="inner">
							<header>
								<p><b>Game Assets</b>  
									<br />// List of my game assets, available on my Itch page as well as the Unity Asset Store.
								</p>
							
							</header>
							<hr class="major" />
							<section class="tiles">
								<article class="style1">
									<a href="trees-polypack/overview/" class="asset-link" aria-label="Trees - Poly Set">
										<span class="image">
											<img src="../images/trees/assets-trees.png" alt="Trees" />
										</span>
										<div class="asset-info">
											<span class="asset-tag">3D</span> <span class="asset-tag">Assets</span>
											<h3 class="asset-name">Trees - Poly Set</h3>
											<span class="asset-price">Coming Soon</span>
										</div>
									</a>
								</article>
								<article class="style2">
									<a href="a+grass/overview/" class="asset-link" aria-label="A+ Grass">
										<span class="image">
											<img src="../images/grass/assets_grass.png" alt="A+ Grass" />
										</span>
										<div class="asset-info">
											<span class="asset-tag">URP</span> <span class="asset-tag">Shader</span>
											<h3 class="asset-name">A+ Grass</h3>
											<span class="asset-price">$9.99</span>
										</div>
									</a>
								</article>

							</section>
						</div>
					</div>

				<div data-include="partials/footer.html"></div>

			</div>

		<!-- Scripts -->
			<script src="js/jquery.min.js"></script>
			<script src="js/browser.min.js"></script>
			<script src="js/breakpoints.min.js"></script>
			<script src="js/util.js"></script>
			<script src="js/includes.js"></script>
			<script src="js/home-tiles.js"></script>
			<script src="js/main.js"></script>

	</body>
</html>
